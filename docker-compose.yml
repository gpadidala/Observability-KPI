services:
  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obs-kpi-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - obs-kpi-network

  # ---- Frontend (Next.js Standalone) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://backend:8000
    container_name: obs-kpi-frontend
    ports:
      - "3000:3000"
    environment:
      - API_BASE_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - obs-kpi-network

networks:
  obs-kpi-network:
    driver: bridge
